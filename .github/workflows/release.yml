name: Publish release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $notes = Get-Content '.github/release-notes.md' -Raw -Encoding utf8
          $notes = $notes.Replace('{{version}}', $version)
          $notes | Set-Content 'release-notes.md' -Encoding utf8
          gh release edit "v$version" --title "一页 v$version" --notes-file 'release-notes.md' --draft=false
